<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DarkPalzy - System Logs</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=600;800&family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg:#000000; --card:#1a1a1a; --muted:#888888; --text:#ffffff;
      --primary:#ff0000; --secondary:#AD4AE7; --accent:#ff3333; --success:#2ecc71;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body {
      font-family:Poppins, sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: radial-gradient(circle at 20% 20%, rgba(255,0,0,.1), transparent 30%),
                  radial-gradient(circle at 80% 10%, rgba(173,74,231,.08), transparent 25%),
                  radial-gradient(circle at 50% 90%, rgba(255,51,51,.05), transparent 30%), var(--bg);
      overflow:hidden; padding:20px;
    }
    .card { background: rgba(255,255,255,.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 30px 25px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 0 30px rgba(255,0,0,.2), 0 0 50px rgba(173,74,231,.1); animation: fadeIn 0.8s ease; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 20px 20px 0 0; z-index: 10; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(25px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
    .logo-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; }
    .logo-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#ffffff 0%, #ff0000 30%, #AD4AE7 60%, #ffffff 100%); animation: rotate 3s linear infinite; padding: 4px; }
    .logo { position: absolute; width: 92px; height: 92px; border-radius: 50%; object-fit: cover; display: block; z-index: 2; background: #1a1a1a; border: 2px solid rgba(255,255,255,0.1); }
    @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .title { font-size:26px; font-family:Orbitron, sans-serif; font-weight:800; color: var(--text); margin-bottom:6px; text-shadow:0 0 15px rgba(255,255,255,.4); letter-spacing: 1px; }
    .subtitle { font-size:13px; color: var(--muted); margin-bottom:25px; font-weight:400; letter-spacing: 0.5px; }
    
    .btn-redirect { width:100%; padding:16px; font-size:15px; font-weight:600; border:none; border-radius:12px; cursor:pointer; background:linear-gradient(135deg, var(--primary), var(--secondary)); color:white; display: inline-block; text-decoration: none; transition: all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow:0 0 20px rgba(255,0,0,.3); position: relative; overflow: hidden; margin-top: 15px; letter-spacing: 0.5px; text-align: center; }
    .btn-redirect:hover { transform:translateY(-4px) scale(1.02); box-shadow:0 0 30px rgba(255,0,0,.5), 0 0 40px rgba(173,74,231,.3); }
    .footer { margin-top:25px; font-size:11px; color:var(--muted); opacity: 0.8; }
    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .particle { position: absolute; border-radius: 50%; opacity: 0.3; animation: float 6s infinite ease-in-out; }
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }
    
    .result-box { margin-top: 15px; padding: 15px; border-radius: 12px; text-align: left; font-size: 13px; line-height: 1.6; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); }
    .result-box.success { border-color: var(--success); box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); }
    .result-box.danger { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }
    .status-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
    .result-box.success .status-title { color: var(--success); }
    .result-box.danger .status-title { color: var(--primary); }
    code { background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 4px; font-family: monospace; color: #ff3333; font-weight: bold; font-size: 14px; }
    .success code { color: #2ecc71; }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="card">
    <div class="logo-container">
      <div class="logo-ring"></div>
      <video class="logo" autoplay loop muted playsinline>
        <source src="https://files.catbox.moe/lflr3x.mp4" type="video/mp4">
      </video>
    </div>
    <div class="title">DarkPalzy</div>
    <div class="subtitle">System Key Generation Logs</div>

    <div class="result-box {{STATUS_CLASS}}">
      <div class="status-title">{{TITLE}}</div>
      <div style="color: #e0e0e0;">{{MESSAGE}}</div>
    </div>

    {{ACTION_BUTTON}}

    <div class="footer">© 2026 - DarkPalzy | Secure System Interface</div>
  </div>
  <script>
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div'); p.classList.add('particle');
        const size = Math.random() * 4 + 1; p.style.width = p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%'; p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 5 + 's'; p.style.animationDuration = Math.random() * 3 + 4 + 's';
        p.style.background = ['#ff0000', '#AD4AE7', '#ff3333'][Math.floor(Math.random() * 3)];
        container.appendChild(p);
      }
    }
    document.addEventListener('DOMContentLoaded', createParticles);
  </script>
</body>
</html>
